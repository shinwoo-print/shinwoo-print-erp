# ─────────────────────────────────────────────
# Nginx Reverse Proxy for shinwoo-print-erp
# ─────────────────────────────────────────────

server {
    listen 80;
    server_name 114.207.245.188;

    # ── 기본 설정 ──
    client_max_body_size 10M;
    proxy_http_version 1.1;

    # Docker 내장 DNS resolver (upstream 동적 해석)
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $backend http://next-app:3000;

    # ── 정적 파일 (Next.js _next/static) ──
    location /_next/static/ {
        proxy_pass $backend;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── 업로드된 이미지 파일 (로컬 디스크에서 직접 서빙) ──
    location /uploads/ {
        alias /usr/share/nginx/uploads/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # ── Health Check ──
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # ── 나머지 모든 요청 → Next.js 프록시 ──
    location / {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 타임아웃 (PDF 생성 등 무거운 작업 대비)
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }
}
