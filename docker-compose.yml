services:
  # ────────── MariaDB ──────────
  mariadb:
    image: mariadb:11
    container_name: shinwoo-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME:-shinwoo_erp}
      MARIADB_USER: ${DB_USER:-shinwoo}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      - db-data:/var/lib/mysql
    expose:
      - "3306"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  # ────────── Next.js App ──────────
  next-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shinwoo-next-app
    restart: unless-stopped
    environment:
      DATABASE_URL: "mysql://${DB_USER:-shinwoo}:${DB_PASSWORD}@mariadb:3306/${DB_NAME:-shinwoo_erp}"
      DATABASE_HOST: mariadb
      DATABASE_PORT: "3306"
      DATABASE_USER: ${DB_USER:-shinwoo}
      DATABASE_PASSWORD: ${DB_PASSWORD}
      DATABASE_NAME: ${DB_NAME:-shinwoo_erp}
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      UPLOAD_DIR: "/app/public"
    volumes:
      - uploads:/app/public/uploads
    networks:
      - app-network
    depends_on:
      mariadb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768M

  # ────────── Nginx Reverse Proxy ──────────
  nginx:
    image: nginx:1-alpine
    container_name: shinwoo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads:/usr/share/nginx/uploads:ro
    networks:
      - app-network
    depends_on:
      - next-app
    deploy:
      resources:
        limits:
          memory: 64M

# ────────── Volumes ──────────
volumes:
  db-data:
    driver: local
  uploads:
    driver: local

# ────────── Networks ──────────
networks:
  app-network:
    driver: bridge
