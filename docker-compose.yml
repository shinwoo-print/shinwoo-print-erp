# ═══════════════════════════════════════════════
# 신우씨링 인쇄업 미니 ERP — Docker Compose
# ═══════════════════════════════════════════════
# next-app  : Next.js 16 + Prisma 7 (포트 3000)
# mariadb   : MariaDB 11.x (포트 3306 내부전용)
# nginx     : 리버스 프록시 (포트 80)
# ═══════════════════════════════════════════════

services:
  # ────────── MariaDB ──────────
  mariadb:
    image: mariadb:11
    container_name: shinwoo-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME:-shinwoo_erp}
      MARIADB_USER: ${DB_USER:-shinwoo}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      - db-data:/var/lib/mysql
    # 포트를 외부에 노출하지 않음 (내부 네트워크만)
    expose:
      - "3306"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # RAM 제한 (2GB 서버 보호)
    deploy:
      resources:
        limits:
          memory: 512M

  # ────────── Next.js App ──────────
  next-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shinwoo-next-app
    restart: unless-stopped
    environment:
      DATABASE_URL: "mysql://${DB_USER:-shinwoo}:${DB_PASSWORD}@mariadb:3306/${DB_NAME:-shinwoo_erp}"
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
    volumes:
      - uploads:/app/public/uploads
    expose:
      - "3000"
    networks:
      - app-network
    depends_on:
      mariadb:
        condition: service_healthy
    # RAM 제한 (빌드는 이미 끝난 상태이므로 런타임 기준)
    deploy:
      resources:
        limits:
          memory: 768M

  # ────────── Nginx Reverse Proxy ──────────
  nginx:
    image: nginx:1-alpine
    container_name: shinwoo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads:/usr/share/nginx/uploads:ro
    networks:
      - app-network
    depends_on:
      - next-app
    deploy:
      resources:
        limits:
          memory: 64M

# ────────── Volumes ──────────
volumes:
  db-data:
    driver: local
  uploads:
    driver: local

# ────────── Networks ──────────
networks:
  app-network:
    driver: bridge
